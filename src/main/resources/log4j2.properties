# ============================================================
# Log4j2 属性配置文件
# ============================================================

# ==================== 根日志记录器配置 ====================

# 根日志记录器的日志级别 (TRACE, DEBUG, INFO, WARN, ERROR)
rootLogger.level = INFO

# 根日志记录器使用的追加器引用，可以引用多个，用逗号分隔
#rootLogger.appenderRef.stdout.ref = Console
rootLogger.appenderRef.file.ref = RollingFile
rootLogger.appenderRef.error.ref = ErrorFile

# ==================== 特定日志记录器配置 ====================

## 为特定包或类设置日志级别
#logger.com.example.name = DEBUG
#logger.com.example.appenderRef.ref = RollingFile
#
## 设置某个包的日志级别并指定是否继承根日志配置 (false 表示不继承)
#logger.com.example.service.name = com.example.service
#logger.com.example.service.level = DEBUG
#logger.com.example.service.additivity = false
#logger.com.example.service.appenderRef.ref = RollingFile

# ==================== 控制台追加器配置 ====================
#
## 控制台追加器类型
#appender.console.type = Console
#
## 控制台追加器名称
#appender.console.name = Console
#
## 控制台输出目标 (SYSTEM_OUT 或 SYSTEM_ERR)
#appender.console.target = SYSTEM_OUT
#
## 控制台输出布局类型
#appender.console.layout.type = PatternLayout
#
## 日志输出格式模式:
## %d{格式} - 日期时间
## %t - 线程名
## %-5level - 日志级别 (左对齐，最小5字符)
## %logger{36} - 日志记录器名称 (最大36字符)
## %msg - 日志消息
## %n - 换行符
## %M - 方法名
## %L - 行号
## %C - 类名
## %throwable - 异常堆栈
#appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# ==================== 文件追加器配置 ====================

## 文件追加器类型
#appender.file.type = File
#
## 文件追加器名称
#appender.file.name = File
#
## 输出文件名
#appender.file.fileName = logs/app.log
#
## 文件追加器布局
#appender.file.layout.type = PatternLayout
#appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# ==================== 滚动文件追加器配置 ====================

# 滚动文件追加器类型
appender.rolling.type = RollingFile

# 滚动文件追加器名称
appender.rolling.name = RollingFile

# 当前正在使用的日志文件名
appender.rolling.fileName = logs/app.log

# 滚动后的日志文件命名模式:
# %d{格式} - 日期
# %i - 序号 (当文件大小触发滚动时使用)
appender.rolling.filePattern = logs/app-%d{yyyy-MM-dd}-%i.log.gz

# 滚动文件布局
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n%throwable

# ==================== 滚动策略配置 ====================

# 策略集合
appender.rolling.policies.type = Policies

# 基于时间的滚动策略 - 按时间间隔滚动日志文件
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy

# 滚动时间间隔 (单位：天)
appender.rolling.policies.time.interval = 1

# 是否在整点时间滚动 (true: 在0点滚动, false: 从启动时间开始计算)
appender.rolling.policies.time.modulate = true

# 基于文件大小的滚动策略 - 当文件达到指定大小时滚动
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy

# 触发滚动的文件大小 (支持 KB, MB, GB)
appender.rolling.policies.size.size = 100MB

# ==================== 滚动覆盖策略配置 ====================

# 默认滚动覆盖策略
appender.rolling.strategy.type = DefaultRolloverStrategy

# 最大保留的日志文件数量 (超出此数量会删除最旧的文件)
appender.rolling.strategy.max = 10

# 删除操作配置 - 当文件数量超过max时删除最旧的文件
appender.rolling.strategy.delete.type = Delete

# 删除的基础路径
appender.rolling.strategy.delete.basePath = logs

# 文件匹配模式 (** 表示递归所有子目录)
appender.rolling.strategy.delete.maxDepth = 2

# 要删除的文件模式
#appender.rolling.strategy.delete.ifFileName = glob:**/*.log.gz

# 删除条件 - 文件最后修改时间早于指定的时间
appender.rolling.strategy.delete.ifLastModified.type = IfLastModified

# 保留时间 (单位：天)
appender.rolling.strategy.delete.ifLastModified.age = 30d

# ==================== 错误日志文件配置 ====================

# 错误日志专用文件追加器
appender.error.type = RollingFile
appender.error.name = ErrorFile
appender.error.fileName = logs/error.log
appender.error.filePattern = logs/error-%d{yyyy-MM-dd}.log

# 错误日志布局
appender.error.layout.type = PatternLayout
appender.error.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n%throwable

# 错误文件策略
appender.error.policies.type = Policies
appender.error.policies.time.type = TimeBasedTriggeringPolicy
appender.error.policies.time.interval = 1
appender.error.policies.time.modulate = true

# 错误文件过滤器
appender.error.filter.threshold.type = ThresholdFilter
appender.error.filter.threshold.level = ERROR
appender.error.filter.threshold.onMatch = ACCEPT
appender.error.filter.threshold.onMismatch = DENY

## ==================== 过滤器配置 ====================
#
## 阈值过滤器 - 只记录指定级别及以上的日志
#appender.error.filter.threshold.type = ThresholdFilter
#
## 过滤级别
#appender.error.filter.threshold.level = ERROR
#
## 匹配时的操作 (ACCEPT: 接受, DENY: 拒绝, NEUTRAL: 中性)
#appender.error.filter.threshold.onMatch = ACCEPT
#
## 不匹配时的操作
#appender.error.filter.threshold.onMismatch = DENY
#
