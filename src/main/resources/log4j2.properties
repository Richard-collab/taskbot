## ==================== 全局属性 ====================
#
## 定义可在配置中引用的属性
#property.filename = logs
#property.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
#
## ==================== 状态日志配置 ====================
#
## 设置 Log4j2 内部状态日志级别 (TRACE, DEBUG, INFO, WARN, ERROR, FATAL)
#status = WARN
#
## 是否显示内部初始化信息
#dest = err
#
## 监控配置文件变化的时间间隔 (秒)
#monitorInterval = 30
#
## ==================== 数据包扫描配置 ====================
#
## 设置 Log4j2 扫描的包路径
#packages = com.example.logging
#
## ==================== 脚本配置 ====================
#
## 脚本语言配置
#script.language = javascript
#
## ==================== 自定义级别配置 ====================
#
## 定义自定义日志级别
#customLevel.verbose = 350